apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: auth-api-ingress
spec:
  ingressClassName: public
  rules:
    - host: auth-api.jifelog.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: auth-api
                port:
                  number: 80